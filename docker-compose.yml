version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: taxai
      POSTGRES_USER: taxai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://taxai:${DB_PASSWORD:-password}@postgres:5432/taxai
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      AI_AGENT_URL: http://ai-agent:8000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BACKEND_INTERNAL_URL: http://backend:4000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
